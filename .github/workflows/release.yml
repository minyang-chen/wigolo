name: Release

on:
  push:
    tags:
      - 'v*.*.*'        # stable, e.g. v1.2.3
      - 'v*.*.*-*'      # pre-release, e.g. v0.1.39-beta.0

permissions:
  contents: write
  id-token: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Tag and package.json agree on version $PKG_VERSION"

      # Beta versions (x.y.z-beta.N) publish to the default `latest` dist-tag so
      # `npm install wigolo` works during the public beta. (For a separate opt-in
      # beta channel instead, add `--tag beta`.)
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish as a normal GitHub Release so the newest version earns the Latest
      # badge and shows in the repo sidebar. The -beta.N version string is what
      # marks it as a beta; GitHub's "Pre-release" flag is intentionally not set.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes
