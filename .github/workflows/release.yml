name: Release

on:
  push:
    tags:
      - 'v*.*.*'        # stable, e.g. v1.2.3
      - 'v*.*.*-*'      # pre-release, e.g. v0.1.39-beta.0

permissions:
  contents: write
  id-token: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    env:
      SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Tag and package.json agree on version $PKG_VERSION"

      # Beta versions (x.y.z-beta.N) publish to the default `latest` dist-tag so
      # `npm install wigolo` works during the public beta. (For a separate opt-in
      # beta channel instead, add `--tag beta`.)
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish as a normal GitHub Release so the newest version earns the Latest
      # badge and shows in the repo sidebar. The -beta.N version string is what
      # marks it as a beta; GitHub's "Pre-release" flag is intentionally not set.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes

      # Publish metadata to the Official MCP Registry. GitHub OIDC (id-token: write
      # above) authenticates the io.github.KnockOutEZ/* namespace with no secrets.
      # server.json is regenerated from package.json each run so the version stays
      # in lockstep with the release. Best-effort: a registry hiccup must not fail
      # a release whose npm + GitHub artifacts already published.
      - name: Publish to MCP Registry
        continue-on-error: true
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          rm -f server.json
          ./mcp-publisher init
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

      # Publish the stdio MCPB bundle to Smithery. Runs only when SMITHERY_API_KEY
      # is set. The manifest version is synced from package.json so it always
      # matches the release. Best-effort, like the registry step.
      - name: Publish to Smithery
        if: ${{ env.SMITHERY_API_KEY != '' }}
        continue-on-error: true
        run: |
          node -e "const fs=require('fs'),p='mcpb/manifest.json',m=require('./'+p);m.version=require('./package.json').version;fs.writeFileSync(p,JSON.stringify(m,null,2)+'\n')"
          npx -y @anthropic-ai/mcpb pack mcpb wigolo.mcpb
          npx -y @smithery/cli mcp publish ./wigolo.mcpb -n ktowhid20/wigolo
