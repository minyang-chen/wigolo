name: Release

on:
  push:
    tags:
      - 'v*.*.*'        # stable, e.g. v1.2.3
      - 'v*.*.*-*'      # pre-release, e.g. v0.1.39-beta.0

permissions:
  contents: write
  id-token: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    env:
      SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Tag and package.json agree on version $PKG_VERSION"

      # Beta versions (x.y.z-beta.N) publish to the default `latest` dist-tag so
      # `npm install wigolo` works during the public beta. (For a separate opt-in
      # beta channel instead, add `--tag beta`.)
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish as a normal GitHub Release so the newest version earns the Latest
      # badge and shows in the repo sidebar. The -beta.N version string is what
      # marks it as a beta; GitHub's "Pre-release" flag is intentionally not set.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes

      # ---------------------------------------------------------------------
      # Sub-package publish (SDKs + framework integrations).
      #
      # Ordering: these run AFTER the root `wigolo` npm publish and the GitHub
      # Release so the critical root artifacts land first. They are NOT
      # continue-on-error — a sub-package failure fails the release loudly so a
      # partial publish is visible, rather than being silently skipped like the
      # best-effort registry/Smithery steps that follow.
      #
      # Every sub-package version is guarded against the tag the same way the
      # root package is, so a version drift stops the publish before it starts.
      # ---------------------------------------------------------------------

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python build tooling
        run: pip install build twine

      - name: Verify sub-package versions match tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          fail=0
          check_npm() {
            local dir="$1"
            local ver
            ver="$(node -p "require('./$dir/package.json').version")"
            if [ "$ver" != "$TAG_VERSION" ]; then
              echo "::error::$dir version $ver does not match tag $TAG_VERSION"
              fail=1
            fi
          }
          check_py() {
            local dir="$1"
            local ver
            ver="$(python -c "import tomllib,sys; print(tomllib.load(open('$dir/pyproject.toml','rb'))['project']['version'])")"
            if [ "$ver" != "$TAG_VERSION" ]; then
              echo "::error::$dir version $ver does not match tag $TAG_VERSION"
              fail=1
            fi
          }
          check_npm sdks/typescript
          check_npm packages/wigolo-ai-sdk
          check_py sdks/python
          check_py packages/wigolo-langchain
          check_py packages/wigolo-crewai
          check_py packages/wigolo-llamaindex
          if [ "$fail" != "0" ]; then exit 1; fi
          echo "All sub-package versions agree on $TAG_VERSION"

      # npm sub-packages: wigolo-sdk and wigolo-ai-sdk.
      - name: Publish wigolo-sdk (npm)
        working-directory: sdks/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm ci
          npm run build
          npm publish --provenance --access public

      - name: Publish wigolo-ai-sdk (npm)
        working-directory: packages/wigolo-ai-sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm ci
          npm run build
          npm publish --provenance --access public

      # PyPI packages: wigolo (SDK) + the three framework integrations.
      - name: Publish wigolo (PyPI)
        working-directory: sdks/python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m build --wheel --sdist
          twine upload dist/*

      - name: Publish wigolo-langchain (PyPI)
        working-directory: packages/wigolo-langchain
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m build --wheel --sdist
          twine upload dist/*

      - name: Publish wigolo-crewai (PyPI)
        working-directory: packages/wigolo-crewai
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m build --wheel --sdist
          twine upload dist/*

      - name: Publish wigolo-llamaindex (PyPI)
        working-directory: packages/wigolo-llamaindex
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m build --wheel --sdist
          twine upload dist/*

      # Publish metadata to the Official MCP Registry. GitHub OIDC (id-token: write
      # above) authenticates the io.github.KnockOutEZ/* namespace with no secrets.
      # server.json is regenerated from package.json each run so the version stays
      # in lockstep with the release. Best-effort: a registry hiccup must not fail
      # a release whose npm + GitHub artifacts already published.
      - name: Publish to MCP Registry
        continue-on-error: true
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          rm -f server.json
          ./mcp-publisher init
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

      # Publish the stdio MCPB bundle to Smithery. Runs only when SMITHERY_API_KEY
      # is set. The manifest version is synced from package.json so it always
      # matches the release. Best-effort, like the registry step.
      - name: Publish to Smithery
        if: ${{ env.SMITHERY_API_KEY != '' }}
        continue-on-error: true
        run: |
          node -e "const fs=require('fs'),p='mcpb/manifest.json',m=require('./'+p);m.version=require('./package.json').version;fs.writeFileSync(p,JSON.stringify(m,null,2)+'\n')"
          npx -y @anthropic-ai/mcpb pack mcpb wigolo.mcpb
          npx -y @smithery/cli mcp publish ./wigolo.mcpb -n ktowhid20/wigolo
