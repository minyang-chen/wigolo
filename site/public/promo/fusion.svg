<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520" role="img" aria-label="18 search engines fused by reciprocal rank fusion, reranked by an on-device cross-encoder, producing one scored answer">
  <style>
    .mono { font-family: "SFMono-Regular", ui-monospace, Menlo, Consolas, "Liberation Mono", monospace; }
    .eyebrow { font-size: 11px; letter-spacing: 2.2px; fill: #595f60; font-weight: 500; }
    .tiny { font-size: 10.5px; fill: #8b9092; }
    .small { font-size: 12px; fill: #595f60; }
    .chip { font-size: 11px; fill: #0c0c09; }

    @keyframes flow { from { stroke-dashoffset: 24; } to { stroke-dashoffset: 0; } }
    .wire { stroke: #cbb0f7; stroke-width: 1.3; fill: none; stroke-dasharray: 3 5; animation: flow 1.6s linear infinite; }
    .wire2 { stroke: #523c79; stroke-width: 1.6; fill: none; stroke-dasharray: 4 4; animation: flow 1.2s linear infinite; }

    @keyframes barIn { 0%, 12% { transform: scaleX(0); } 40%, 100% { transform: scaleX(1); } }
    .rbar { transform-box: fill-box; transform-origin: left center; animation: barIn 6s cubic-bezier(0.16, 1, 0.3, 1) infinite; }
    @keyframes fadeIn { 0%, 30% { opacity: 0; } 48%, 100% { opacity: 1; } }
    .rscore { opacity: 0; animation: fadeIn 6s linear infinite; }
  </style>

  <rect width="880" height="520" fill="#f4f4f0"/>
  <rect x="1.5" y="1.5" width="877" height="517" fill="none" stroke="#dbdfe0"/>

  <text x="36" y="46" class="mono eyebrow">WIGOLO · SEARCH</text>
  <text x="36" y="74" class="mono" font-size="26" fill="#0c0c09" font-weight="700">18 ENGINES. ONE ANSWER.</text>
  <text x="844" y="46" text-anchor="end" class="mono tiny">rank fusion + on-device rerank</text>
  <text x="844" y="62" text-anchor="end" class="mono tiny">no middleman API</text>
  <line x1="36" y1="92" x2="844" y2="92" stroke="#dbdfe0"/>

  <!-- 18 engine chips: 2 cols x 9 rows, x 36/162, rows start y 120 step 36 -->
  <g class="mono chip">
    <rect x="36"  y="120" width="118" height="24" rx="12" fill="#ffffff" stroke="#dbdfe0"/><text x="95"  y="136" text-anchor="middle">bing</text>
    <rect x="162" y="120" width="118" height="24" rx="12" fill="#ffffff" stroke="#dbdfe0"/><text x="221" y="136" text-anchor="middle">duckduckgo</text>
    <rect x="36"  y="156" width="118" height="24" rx="12" fill="#ffffff" stroke="#dbdfe0"/><text x="95"  y="172" text-anchor="middle">brave</text>
    <rect x="162" y="156" width="118" height="24" rx="12" fill="#ffffff" stroke="#dbdfe0"/><text x="221" y="172" text-anchor="middle">mojeek</text>
    <rect x="36"  y="192" width="118" height="24" rx="12" fill="#ffffff" stroke="#dbdfe0"/><text x="95"  y="208" text-anchor="middle">wikipedia</text>
    <rect x="162" y="192" width="118" height="24" rx="12" fill="#ffffff" stroke="#dbdfe0"/><text x="221" y="208" text-anchor="middle">marginalia</text>
    <rect x="36"  y="228" width="118" height="24" rx="12" fill="#ffffff" stroke="#dbdfe0"/><text x="95"  y="244" text-anchor="middle">github code</text>
    <rect x="162" y="228" width="118" height="24" rx="12" fill="#ffffff" stroke="#dbdfe0"/><text x="221" y="244" text-anchor="middle">stackoverflow</text>
    <rect x="36"  y="264" width="118" height="24" rx="12" fill="#ffffff" stroke="#dbdfe0"/><text x="95"  y="280" text-anchor="middle">mdn</text>
    <rect x="162" y="264" width="118" height="24" rx="12" fill="#ffffff" stroke="#dbdfe0"/><text x="221" y="280" text-anchor="middle">devdocs</text>
    <rect x="36"  y="300" width="118" height="24" rx="12" fill="#ffffff" stroke="#dbdfe0"/><text x="95"  y="316" text-anchor="middle">hn · algolia</text>
    <rect x="162" y="300" width="118" height="24" rx="12" fill="#ffffff" stroke="#dbdfe0"/><text x="221" y="316" text-anchor="middle">lobsters</text>
    <rect x="36"  y="336" width="118" height="24" rx="12" fill="#ffffff" stroke="#dbdfe0"/><text x="95"  y="352" text-anchor="middle">arxiv</text>
    <rect x="162" y="336" width="118" height="24" rx="12" fill="#ffffff" stroke="#dbdfe0"/><text x="221" y="352" text-anchor="middle">sem. scholar</text>
    <rect x="36"  y="372" width="118" height="24" rx="12" fill="#ffffff" stroke="#dbdfe0"/><text x="95"  y="388" text-anchor="middle">bing news</text>
    <rect x="162" y="372" width="118" height="24" rx="12" fill="#ffffff" stroke="#dbdfe0"/><text x="221" y="388" text-anchor="middle">rss</text>
    <rect x="36"  y="408" width="118" height="24" rx="12" fill="#ffffff" stroke="#dbdfe0"/><text x="95"  y="424" text-anchor="middle">brave images</text>
    <rect x="162" y="408" width="118" height="24" rx="12" fill="#ffffff" stroke="#dbdfe0"/><text x="221" y="424" text-anchor="middle">ddg images</text>
  </g>

  <!-- wires: chips -> fusion node (fan-in to x 420, y 276) -->
  <g class="wire">
    <path d="M 280 132 C 340 132 360 250 408 268"/>
    <path d="M 280 168 C 340 168 360 254 408 270"/>
    <path d="M 280 204 C 340 204 362 258 408 272"/>
    <path d="M 280 240 C 344 240 366 264 408 274"/>
    <path d="M 280 276 C 344 276 368 276 408 276"/>
    <path d="M 280 312 C 344 312 366 288 408 278"/>
    <path d="M 280 348 C 340 348 362 292 408 280"/>
    <path d="M 280 384 C 340 384 360 296 408 282"/>
    <path d="M 280 420 C 336 420 358 300 408 284"/>
  </g>

  <!-- fusion node -->
  <g>
    <rect x="408" y="238" width="120" height="76" rx="10" fill="#f3ecff" stroke="#cbb0f7"/>
    <text x="468" y="268" text-anchor="middle" class="mono" font-size="12" fill="#523c79" font-weight="700">RRF</text>
    <text x="468" y="284" text-anchor="middle" class="mono" font-size="10.5" fill="#523c79">rank fusion</text>
    <text x="468" y="299" text-anchor="middle" class="mono" font-size="10.5" fill="#523c79">+ dedup</text>
  </g>

  <!-- wire fusion -> rerank -->
  <path class="wire2" d="M 528 276 H 566"/>

  <!-- rerank node -->
  <g>
    <rect x="566" y="238" width="120" height="76" rx="10" fill="#523c79"/>
    <text x="626" y="266" text-anchor="middle" class="mono" font-size="12" fill="#ffffff" font-weight="700">cross-encoder</text>
    <text x="626" y="282" text-anchor="middle" class="mono" font-size="10.5" fill="#cbb0f7">on-device rerank</text>
    <text x="626" y="297" text-anchor="middle" class="mono" font-size="10.5" fill="#cbb0f7">$0 · private</text>
  </g>

  <!-- ranked output: bars right of rerank, real scores from the live capture -->
  <g>
    <text x="712" y="196" class="mono eyebrow">RANKED · SCORED</text>
    <g class="mono" font-size="11">
      <rect class="rbar" x="712" y="212" width="132" height="14" rx="3" fill="#523c79"/>
      <text class="rscore" x="712" y="240" fill="#523c79" font-weight="700">0.93</text><text class="rscore" x="744" y="240" font-size="10" fill="#8b9092">postgresql.org</text>

      <rect class="rbar" x="712" y="256" width="106" height="14" rx="3" fill="#523c79" opacity="0.85"/>
      <text class="rscore" x="712" y="284" fill="#523c79" font-weight="700">0.75</text><text class="rscore" x="744" y="284" font-size="10" fill="#8b9092">logicalreplication.org</text>

      <rect class="rbar" x="712" y="300" width="104" height="14" rx="3" fill="#523c79" opacity="0.7"/>
      <text class="rscore" x="712" y="328" fill="#523c79" font-weight="700">0.74</text><text class="rscore" x="744" y="328" font-size="10" fill="#8b9092">postgresql.org/docs</text>

      <rect class="rbar" x="712" y="344" width="103" height="14" rx="3" fill="#523c79" opacity="0.55"/>
      <text class="rscore" x="712" y="372" fill="#523c79" font-weight="700">0.73</text><text class="rscore" x="744" y="372" font-size="10" fill="#8b9092">scalegrid.io</text>

      <rect class="rbar" x="712" y="388" width="43" height="14" rx="3" fill="#dbdfe0"/>
      <text class="rscore" x="712" y="416" fill="#8b9092" font-weight="700">0.30</text><text class="rscore" x="744" y="416" font-size="10" fill="#8b9092">flagged as junk ↓</text>
    </g>
  </g>

  <!-- footer -->
  <line x1="36" y1="456" x2="844" y2="456" stroke="#dbdfe0"/>
  <text x="36" y="478" class="mono small">Any one engine failing barely moves the answer — consensus is the signal.</text>
  <text x="36" y="496" class="mono tiny">output scores from a real query, captured live 2026-07-05</text>
  <text x="844" y="478" text-anchor="end" class="mono" font-size="13" fill="#0c0c09" font-weight="700">$ npx wigolo init</text>
  <text x="844" y="496" text-anchor="end" class="mono tiny">wigolo — local-first web intelligence over MCP</text>
</svg>
