services:
  wigolo:
    build:
      context: .
      dockerfile: Dockerfile
    image: wigolo-finance:latest
    container_name: wigolo_search
    command: ["serve", "--host", "0.0.0.0", "--port", "3333", "--allow-unauthenticated"]
    ports:
      - "8017:3333"
    volumes:
      - wigolo-data:/data
    environment:
      WIGOLO_DATA_DIR: /data
      # Allow unauthenticated on LAN — service is only accessible within homelab network.
      # Set WIGOLO_API_TOKEN here and remove --allow-unauthenticated if exposed externally.
      WIGOLO_SERVE_ALLOW_UNAUTHENTICATED: "1"
      # Point at our existing SearXNG instance for additional search engine coverage.
      # SearXNG runs on port 8588 on this host (via web_search_service compose).
      SEARXNG_URL: ${SEARXNG_URL:-http://172.17.0.1:8588}
      # LLM provider for research + answer synthesis — use local llm_service (port 8000).
      # Without this, search/fetch/crawl/extract still work fully keyless.
      WIGOLO_LLM_PROVIDER: ${WIGOLO_LLM_PROVIDER:-openai}
      WIGOLO_LLM_BASE_URL: ${WIGOLO_LLM_BASE_URL:-http://172.17.0.1:8000/v1}
      WIGOLO_LLM_MODEL_OPENAI: ${WIGOLO_LLM_MODEL_OPENAI:-qwen3.5-4b}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-mclab-llm-key}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3333/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  wigolo-data:
