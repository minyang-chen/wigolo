[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "wigolo-langchain"
version = "0.2.0"
description = "LangChain integration for wigolo — local-first web search MCP server"
readme = "README.md"
license = "AGPL-3.0-only"
requires-python = ">=3.10"
authors = [{ name = "KnockOutEZ" }]
keywords = ["langchain", "mcp", "web-search", "retriever", "agent-tools"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: Other/Proprietary License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "langchain-core>=0.3.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-mock>=3.14",
]

[project.urls]
Homepage = "https://github.com/KnockOutEZ/wigolo"
Repository = "https://github.com/KnockOutEZ/wigolo/tree/main/packages/wigolo-langchain"
Issues = "https://github.com/KnockOutEZ/wigolo/issues"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
